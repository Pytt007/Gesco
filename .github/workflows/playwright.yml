name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers & OS Dependencies
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        # Fournir des clés fictives pour le build Vite / Supabase client dans l'environnement de CI
        VITE_SUPABASE_URL: "https://mockproject.supabase.co"
        VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mockKey"
        CI: true

    - name: Upload Playwright Report on Failure
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() && failure() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
